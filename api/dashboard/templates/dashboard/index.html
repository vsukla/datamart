<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datamart — Census Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    body { background: #f1f5f9; font-family: system-ui, sans-serif; }
    .navbar { background: #0f172a !important; }
    .card { border: none; box-shadow: 0 1px 4px rgba(0,0,0,.08); border-radius: 10px; }
    .card-header {
      background: #fff; font-weight: 600; font-size: .85rem;
      letter-spacing: .02em; text-transform: uppercase; color: #64748b;
      border-bottom: 1px solid #e2e8f0; border-radius: 10px 10px 0 0 !important;
    }
    .form-label { font-size: .8rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: .04em; }
    .form-select { font-size: .9rem; }
    .stat-pill {
      display: inline-block; padding: 2px 10px; border-radius: 99px;
      font-size: .78rem; font-weight: 600;
    }
    .pill-up   { background: #dcfce7; color: #16a34a; }
    .pill-down { background: #fee2e2; color: #dc2626; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark px-4 py-3">
  <span class="navbar-brand fw-bold fs-5">Datamart</span>
  <span class="text-white-50 small">Census ACS5 · 2018–2022</span>
</nav>

<div class="container-fluid px-4 py-4">

  <!-- Controls -->
  <div class="row g-3 mb-4 align-items-end">
    <div class="col-sm-5 col-md-4 col-lg-3">
      <label class="form-label">Metric</label>
      <select id="metricSelect" class="form-select form-select-sm">
        {% for key, label in metric_labels.items %}
        <option value="{{ key }}">{{ label }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col-sm-3 col-md-2 col-lg-2">
      <label class="form-label">Year</label>
      <select id="yearSelect" class="form-select form-select-sm">
        {% for y in years %}
        <option value="{{ y }}"{% if y == 2022 %} selected{% endif %}>{{ y }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="col">
      <p class="text-muted small mb-0 pb-1">
        National averages are population-weighted from state data.
        State summaries roll up county-level estimates.
      </p>
    </div>
  </div>

  <!-- National trend -->
  <div class="row mb-4">
    <div class="col-12">
      <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
          <span>National Trend</span>
          <span id="nationalStat" class="text-dark fw-normal" style="font-size:.9rem;text-transform:none;letter-spacing:0;"></span>
        </div>
        <div class="card-body py-3">
          <div style="position:relative;height:200px;">
            <canvas id="nationalChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- State ranking + YoY -->
  <div class="row g-4">
    <div class="col-xl-7 col-lg-6">
      <div class="card h-100">
        <div class="card-header">
          State Ranking — <span id="stateChartYear" class="text-dark" style="font-size:.9rem;text-transform:none;letter-spacing:0;"></span>
        </div>
        <div class="card-body p-2">
          <div style="position:relative;height:660px;">
            <canvas id="stateChart"></canvas>
          </div>
        </div>
      </div>
    </div>
    <div class="col-xl-5 col-lg-6">
      <div class="card h-100">
        <div class="card-header">Year-over-Year Change — Top &amp; Bottom 5 States</div>
        <div class="card-body">
          <div id="yoyNote" class="alert alert-secondary small py-2 d-none">
            No year-over-year data for 2018 (no prior year).
          </div>
          <div style="position:relative;height:620px;">
            <canvas id="yoyChart"></canvas>
          </div>
        </div>
      </div>
    </div>
  </div>

</div><!-- /container -->

<script>
  // --- Data injected by Django ---
  const national     = {{ national_json|safe }};
  const stateSummary = {{ state_summary_json|safe }};
  const yoy          = {{ yoy_json|safe }};
  const stateNames   = {{ state_names_json|safe }};
  const metricLabels = {{ metric_labels_json|safe }};

  const DOLLAR_METRICS = new Set(["median_income", "median_home_value"]);

  function fmt(metric, v) {
    if (v === null || v === undefined) return "N/A";
    const n = parseFloat(v);
    if (DOLLAR_METRICS.has(metric))
      return "$" + n.toLocaleString("en-US", { maximumFractionDigits: 0 });
    return n.toFixed(2) + "%";
  }

  function axisFmt(metric) {
    if (DOLLAR_METRICS.has(metric))
      return v => "$" + (v >= 1000 ? Math.round(v / 1000) + "k" : v);
    return v => v + "%";
  }

  let nationalChart, stateChart, yoyChart;

  // --- National trend (line) ---
  function buildNationalChart(metric) {
    const labels = national.map(r => r.year);
    const data   = national.map(r => r[`avg_${metric}`] !== null ? parseFloat(r[`avg_${metric}`]) : null);

    // Stat badge: latest value + change from first year
    const first = data[0], last = data[data.length - 1];
    if (first !== null && last !== null) {
      const chg = ((last - first) / first * 100).toFixed(1);
      const dir = chg >= 0;
      document.getElementById("nationalStat").innerHTML =
        `${fmt(metric, last)} &nbsp;<span class="stat-pill ${dir ? "pill-up" : "pill-down"}">${dir ? "+" : ""}${chg}% since 2018</span>`;
    }

    if (nationalChart) nationalChart.destroy();
    nationalChart = new Chart(document.getElementById("nationalChart"), {
      type: "line",
      data: {
        labels,
        datasets: [{
          label: metricLabels[metric],
          data,
          borderColor: "#3b82f6",
          backgroundColor: "rgba(59,130,246,.08)",
          fill: true,
          tension: 0.35,
          pointRadius: 5,
          pointHoverRadius: 7,
          pointBackgroundColor: "#3b82f6",
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => " " + fmt(metric, c.raw) } }
        },
        scales: {
          y: { beginAtZero: false, ticks: { callback: axisFmt(metric) } }
        }
      }
    });
  }

  // --- State ranking (horizontal bar) ---
  function buildStateChart(metric, year) {
    document.getElementById("stateChartYear").textContent = year;

    const rows = stateSummary
      .filter(r => r.year == year)
      .map(r => ({
        name:  stateNames[r.state_fips] || r.state_fips,
        value: r[`avg_${metric}`] !== null ? parseFloat(r[`avg_${metric}`]) : null,
      }))
      .filter(r => r.value !== null)
      .sort((a, b) => b.value - a.value);

    if (stateChart) stateChart.destroy();
    stateChart = new Chart(document.getElementById("stateChart"), {
      type: "bar",
      data: {
        labels: rows.map(r => r.name),
        datasets: [{
          data: rows.map(r => r.value),
          backgroundColor: rows.map((_, i) =>
            i < 5  ? "rgba(59,130,246,.85)"  :
            i >= rows.length - 5 ? "rgba(239,68,68,.75)" :
                     "rgba(148,163,184,.65)"
          ),
          borderRadius: 3,
        }]
      },
      options: {
        indexAxis: "y",
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: { callbacks: { label: c => " " + fmt(metric, c.raw) } }
        },
        scales: {
          x: { beginAtZero: false, ticks: { callback: axisFmt(metric) } },
          y: { ticks: { font: { size: 10.5 } } }
        }
      }
    });
  }

  // --- YoY movers (horizontal bar) ---
  function buildYoYChart(metric, year) {
    const note = document.getElementById("yoyNote");
    const rows = yoy.filter(r => r.metric === metric && r.year == year && r.change_pct !== null);

    if (rows.length === 0) {
      note.classList.remove("d-none");
      if (yoyChart) { yoyChart.destroy(); yoyChart = null; }
      return;
    }
    note.classList.add("d-none");

    const sorted = [...rows].sort((a, b) => parseFloat(b.change_pct) - parseFloat(a.change_pct));
    const top5   = sorted.slice(0, 5);
    const bot5   = sorted.slice(-5).reverse();
    const display = [...top5, ...bot5];

    if (yoyChart) yoyChart.destroy();
    yoyChart = new Chart(document.getElementById("yoyChart"), {
      type: "bar",
      data: {
        labels: display.map(r => stateNames[r.state_fips] || r.state_fips),
        datasets: [{
          data: display.map(r => parseFloat(r.change_pct)),
          backgroundColor: display.map(r =>
            parseFloat(r.change_pct) >= 0 ? "rgba(34,197,94,.8)" : "rgba(239,68,68,.75)"
          ),
          borderRadius: 3,
        }]
      },
      options: {
        indexAxis: "y",
        responsive: true, maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: c => {
                const row = display[c.dataIndex];
                return [
                  ` Change: ${c.raw > 0 ? "+" : ""}${c.raw}%`,
                  ` Value:  ${fmt(metric, row.value)}`,
                ];
              }
            }
          }
        },
        scales: {
          x: { ticks: { callback: v => (v > 0 ? "+" : "") + v + "%" } },
          y: { ticks: { font: { size: 10.5 } } }
        }
      }
    });
  }

  // --- Wire up controls ---
  function updateAll() {
    const metric = document.getElementById("metricSelect").value;
    const year   = parseInt(document.getElementById("yearSelect").value, 10);
    buildNationalChart(metric);
    buildStateChart(metric, year);
    buildYoYChart(metric, year);
  }

  document.getElementById("metricSelect").addEventListener("change", updateAll);
  document.getElementById("yearSelect").addEventListener("change", updateAll);
  updateAll();
</script>
</body>
</html>
